<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" width="800" height="450" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf7f2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f0eade;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Browser chrome -->
  <rect x="0" y="0" width="800" height="36" fill="#eeece8" rx="0"/>
  <circle cx="20" cy="18" r="5" fill="#ff5f57"/>
  <circle cx="38" cy="18" r="5" fill="#ffbd2e"/>
  <circle cx="56" cy="18" r="5" fill="#28c840"/>
  <rect x="120" y="10" width="560" height="16" rx="3" fill="#ddd9d3"/>
  <text x="400" y="22" font-family="sans-serif" font-size="9" fill="#999" text-anchor="middle">nyjuliabraids.com.br</text>
  <!-- Page content -->
  <rect x="0" y="36" width="800" height="414" fill="url(#bg)"/>
  <!-- Nav -->
  <text x="50" y="72" font-family="serif" font-size="18" fill="#4a3728" font-weight="bold">Ny Julia Braids</text>
  <text x="530" y="72" font-family="sans-serif" font-size="11" fill="#6b5a4a">Início</text>
  <text x="590" y="72" font-family="sans-serif" font-size="11" fill="#6b5a4a">Tranças</text>
  <text x="660" y="72" font-family="sans-serif" font-size="11" fill="#6b5a4a">Galeria</text>
  <text x="720" y="72" font-family="sans-serif" font-size="11" fill="#6b5a4a">Contato</text>
  <!-- Hero section -->
  <text x="60" y="150" font-family="sans-serif" font-size="11" fill="#c4a882" letter-spacing="3">ESTÚDIO DE TRANÇAS</text>
  <rect x="60" y="160" width="40" height="2" fill="#c4a882"/>
  <text x="60" y="210" font-family="serif" font-size="42" font-weight="bold" fill="#3d2c1f">Tranças que</text>
  <text x="60" y="255" font-family="serif" font-size="42" font-weight="bold" fill="#3d2c1f">contam histórias</text>
  <text x="60" y="295" font-family="sans-serif" font-size="13" fill="#8a7a6a">Especializada em tranças afro, box braids,</text>
  <text x="60" y="315" font-family="sans-serif" font-size="13" fill="#8a7a6a">tranças nagô e penteados personalizados.</text>
  <rect x="60" y="350" width="140" height="38" rx="0" fill="#3d2c1f"/>
  <text x="130" y="374" font-family="sans-serif" font-size="11" fill="#fff" text-anchor="middle" letter-spacing="1">AGENDAR HORÁRIO</text>
  <!-- Decorative braid pattern -->
  <g stroke="#d4c4b0" stroke-width="2" fill="none" opacity="0.5">
    <path d="M520,100 C540,130 580,130 600,100 C620,130 660,130 680,100 C700,130 740,130 760,100"/>
    <path d="M520,140 C540,170 580,170 600,140 C620,170 660,170 680,140 C700,170 740,170 760,140"/>
    <path d="M520,180 C540,210 580,210 600,180 C620,210 660,210 680,180 C700,210 740,210 760,180"/>
    <path d="M520,220 C540,250 580,250 600,220 C620,250 660,250 680,220 C700,250 740,250 760,220"/>
    <path d="M520,260 C540,290 580,290 600,260 C620,290 660,290 680,260 C700,290 740,290 760,260"/>
  </g>
  <!-- Gallery thumbnails -->
  <rect x="540" y="310" width="70" height="80" fill="#ddd0be" rx="0"/>
  <rect x="620" y="310" width="70" height="80" fill="#ddd0be" rx="0"/>
  <rect x="700" y="310" width="70" height="80" fill="#ddd0be" rx="0"/>
